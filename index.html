<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Young Woo Song — AI Builder</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    /* deep-navy skeuomorphic base */
    --bg: #070b16;
    --bg-deep: #04060d;
    --navy-hi: #162C6D;                    /* royal card top */
    --navy-lo: #0A101D;                    /* deep card bottom */
    --panel: rgba(255,255,255,0.03);
    --line: rgba(150,170,220,0.10);
    --line-strong: rgba(150,170,220,0.24);
    --grid: rgba(150,170,220,0.06);

    /* near-silver inks */
    --ink: #e9edf6;
    --ink-dim: rgba(233,237,246,0.58);
    --ink-faint: rgba(233,237,246,0.34);

    --accent: #6f8bff;                     /* azure / periwinkle */
    --accent-2: #9db4ff;                   /* light azure */
    --accent-soft: rgba(111,139,255,0.16);
    --accent-glow: rgba(111,139,255,0.42);
    --warn: #fbbf24;
    --ok: #84cc16;

    --fs-mono: "JetBrains Mono", "IBM Plex Mono", "Geist Mono", ui-monospace, monospace;

    --u: 8px;
    --pad-x: clamp(20px, 4.5vw, 72px);
    --content-max: 1280px;

    /* reusable skeuomorphic shadow stacks */
    --depth-card:
      0 40px 100px -28px rgba(0,0,0,0.85),
      0 18px 40px -22px rgba(0,0,0,0.7),
      inset 0 1px 1px rgba(255,255,255,0.10),
      inset 0 -2px 4px rgba(0,0,0,0.55);
    --depth-glass:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 50px -16px rgba(0,0,0,0.7),
      inset 0 1px 1px rgba(255,255,255,0.14),
      inset 0 -1px 1px rgba(0,0,0,0.5);
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--fs-mono);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{overflow-x:hidden;min-height:100vh;font-feature-settings:"calt","ss01","cv02"}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
  ::selection{background:var(--accent-soft);color:#fff}
  /* No italics — anywhere */
  i,em,.italic,[data-italic]{font-style:normal !important}

  /* silver-matte heading treatment (skeuomorphic depth, theme-locked silver) */
  .text-silver{
    background:linear-gradient(180deg, #ffffff 0%, #9aa6c4 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    color:transparent;transform:translateZ(0);
    filter:drop-shadow(0 12px 22px rgba(0,0,0,0.45)) drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  /* layout */
  .wrap{position:relative;z-index:1;max-width:var(--content-max);margin:0 auto;padding-left:var(--pad-x);padding-right:var(--pad-x)}

  /* utilities */
  .mono{font-family:var(--fs-mono)}
  .upper{text-transform:uppercase;letter-spacing:0.14em;font-size:11px;font-weight:500}
  .num{font-variant-numeric:tabular-nums}

  /* cosmic / deep-navy background */
  #cosmic-stage{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    background:
      radial-gradient(80% 60% at 50% 0%, rgba(111,139,255,0.10), transparent 60%),
      radial-gradient(60% 44% at 82% 24%, rgba(22,44,109,0.40), transparent 62%),
      linear-gradient(180deg, #0a1124 0%, var(--bg) 46%, var(--bg-deep) 100%)}
  #cosmic-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;opacity:0.85}
  /* tech grid overlay (navy-toned, radial mask) */
  #cosmic-stage::before{content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size: 80px 80px, 80px 80px;
    mask-image: radial-gradient(ellipse at 50% 30%, #000 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 30%, #000 0%, transparent 70%);
  }
  /* film grain overlay (cinematic) */
  #cosmic-stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:2;
    opacity:0.05;mix-blend-mode:overlay;
    background:url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');
  }
  .scanline{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.14;pointer-events:none;animation:scan 7s linear infinite}
  @keyframes scan{0%{top:-2%}100%{top:102%}}
  .vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, transparent 52%, rgba(0,0,0,0.62) 100%);pointer-events:none}

  /* scroll progress bar */
  .scroll-progress{position:fixed;top:0;left:0;right:0;height:2px;z-index:60;background:transparent;pointer-events:none}
  .scroll-progress .bar{height:100%;background:linear-gradient(90deg, var(--accent), var(--accent-2));width:0%;box-shadow:0 0 18px var(--accent-glow)}

  /* nav (glass) */
  .nav{position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);background:linear-gradient(180deg, rgba(8,12,24,0.82), rgba(8,12,24,0.0));border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(255,255,255,0.04) inset}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:var(--content-max);margin:0 auto;padding-left:var(--pad-x);padding-right:var(--pad-x)}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--fs-mono);font-size:12px;letter-spacing:0.06em;font-weight:500}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent-glow)}
  .nav-links{display:flex;gap:24px}
  .nav-links a{font-family:var(--fs-mono);font-size:11px;color:var(--ink-dim);letter-spacing:0.08em;text-transform:uppercase;transition:color .2s;position:relative}
  .nav-links a:hover{color:var(--ink)}
  .nav-links a::before{content:"./";color:var(--ink-faint);margin-right:2px;opacity:0;transition:opacity .2s}
  .nav-links a:hover::before{opacity:1}
  /* physical tactile dark button */
  .nav-cta{font-family:var(--fs-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink);padding:7px 13px;border-radius:10px;display:inline-flex;gap:8px;align-items:center;
    background:linear-gradient(180deg, #2a3252 0%, #141a2e 100%);
    box-shadow:0 0 0 1px rgba(255,255,255,0.08), 0 2px 4px rgba(0,0,0,0.5), 0 10px 20px -6px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.14), inset 0 -3px 6px rgba(0,0,0,0.6);
    transition:all .35s cubic-bezier(.25,1,.5,1)}
  .nav-cta::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
  .nav-cta:hover{transform:translateY(-2px);color:var(--accent);background:linear-gradient(180deg, #354065 0%, #1b2238 100%);box-shadow:0 0 0 1px rgba(255,255,255,0.12), 0 6px 12px -2px rgba(0,0,0,0.6), 0 18px 30px -8px rgba(0,0,0,0.85), inset 0 1px 1px rgba(255,255,255,0.18), inset 0 -3px 6px rgba(0,0,0,0.6)}
  @media (max-width: 760px){.nav-links{display:none}}

  /* section frame */
  section{position:relative;padding-top:calc(var(--u) * 14);padding-bottom:calc(var(--u) * 14)}
  .section-tag{display:flex;align-items:center;gap:14px;color:var(--ink-faint);margin-bottom:calc(var(--u)*4);font-size:11px;letter-spacing:0.1em;text-transform:uppercase}
  .section-tag .rule{flex:1;height:1px;background:linear-gradient(90deg, var(--line-strong), transparent)}
  .section-tag .marker{color:var(--accent)}

  /* ─────────────── HERO ─────────────── */
  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-top:80px;padding-bottom:80px}

  /* terminal boot panel sits above the headline */
  .boot{font-family:var(--fs-mono);font-size:11.5px;color:var(--ink-dim);margin-bottom:40px;max-width:680px;line-height:1.65;min-height:160px}
  .boot .line{display:block;white-space:pre-wrap}
  .boot .ok{color:var(--ok)}
  .boot .acc{color:var(--accent)}
  .boot .dim{color:var(--ink-faint)}
  .boot .warn{color:var(--warn)}
  .caret{display:inline-block;width:9px;height:14px;background:var(--accent);vertical-align:-2px;margin-left:2px;animation:caret 1s steps(1) infinite;box-shadow:0 0 10px var(--accent-glow)}
  @keyframes caret{0%,49%{opacity:1}50%,100%{opacity:0}}

  .hero-meta{display:flex;align-items:center;gap:12px;color:var(--ink-faint);margin-bottom:28px}
  .status-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:999px;font-family:var(--fs-mono);font-size:11px;letter-spacing:0.04em;color:var(--ink-dim);
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    box-shadow:var(--depth-glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .status-pill .pulse{position:relative;width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px rgba(132,204,22,0.7)}
  .status-pill .pulse::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(132,204,22,0.5);animation:pulse 2.4s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.4);opacity:1}100%{transform:scale(1.6);opacity:0}}

  .hero h1{font-family:var(--fs-mono);font-weight:500;font-size:clamp(40px, 8vw, 124px);line-height:0.96;letter-spacing:-0.04em;margin:0;color:var(--ink);text-transform:lowercase;
    background:linear-gradient(180deg, #ffffff 0%, #9aa6c4 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 16px 30px rgba(0,0,0,0.5)) drop-shadow(0 3px 6px rgba(0,0,0,0.4))}
  .hero h1 .acc{color:var(--accent);-webkit-text-fill-color:var(--accent);filter:drop-shadow(0 0 18px var(--accent-glow))}
  .hero h1 .glyph-shuffle{display:inline-block}
  .hero h1 .gs-char{display:inline-block;min-width:.55ch;text-align:center}
  .hero h1 .gs-flash{color:var(--accent);-webkit-text-fill-color:var(--accent);text-shadow:0 0 14px var(--accent-glow)}
  .hero h1 .underline{position:relative;display:inline-block}
  .hero h1 .underline::after{content:"";position:absolute;left:0;right:0;bottom:0.06em;height:2px;background:var(--accent);box-shadow:0 0 18px var(--accent-glow);transform-origin:left;transform:scaleX(0);animation:drawLine 1.2s .8s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes drawLine{to{transform:scaleX(1)}}

  .hero-tag{margin-top:32px;font-size:14px;color:var(--ink-dim);max-width:64ch;line-height:1.65}
  .hero-tag .prompt{color:var(--accent);margin-right:8px}

  .hero-foot{display:flex;align-items:end;justify-content:flex-start;margin-top:56px;gap:48px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:24px}
  .hero-foot .col{display:flex;flex-direction:column;gap:6px;min-width:140px}
  .hero-foot .k{font-family:var(--fs-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint)}
  .hero-foot .v{font-family:var(--fs-mono);font-size:12.5px;color:var(--ink-dim)}
  .hero-foot .v a{position:relative;transition:color .2s}
  .hero-foot .v a:hover{color:var(--accent)}

  .scroll-cue{position:absolute;left:50%;transform:translateX(-50%);bottom:18px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--ink-faint);font-family:var(--fs-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase}
  .scroll-cue .line{width:1px;height:32px;background:linear-gradient(180deg, transparent, var(--accent));animation:scrollLine 2.2s ease-in-out infinite}
  @keyframes scrollLine{0%,100%{transform:scaleY(.6);opacity:.4}50%{transform:scaleY(1);opacity:1}}

  /* HERO variants */
  .hero.variant-coords .coord-grid{position:absolute;inset:80px var(--pad-x);pointer-events:none;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;color:var(--ink-faint);font-family:var(--fs-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase}
  .hero.variant-coords .coord-grid > div{padding:6px}
  .hero.variant-coords .coord-grid > div:nth-child(1){text-align:left;color:var(--accent)}
  .hero.variant-coords .coord-grid > div:nth-child(3){text-align:right}
  .hero.variant-coords .coord-grid > div:nth-child(7){text-align:left;align-self:end}
  .hero.variant-coords .coord-grid > div:nth-child(9){text-align:right;align-self:end;color:var(--ok)}
  .hero.variant-split .hero-tag{max-width:46ch}

  /* ─────────────── WORK ─────────────── */
  .work-list{display:flex;flex-direction:column;border-top:1px solid var(--line)}
  .work-row{position:relative;display:grid;grid-template-columns:48px 1fr auto auto;align-items:center;gap:24px;padding:calc(var(--u)*3.2) 0;border-bottom:1px solid var(--line);cursor:pointer;transition:padding .35s ease, background .35s ease}
  .work-row::before{content:"";position:absolute;left:0;top:0;width:2px;height:100%;background:var(--accent);box-shadow:0 0 14px var(--accent-glow);transform:scaleY(0);transform-origin:center;transition:transform .35s ease}
  .work-row:hover{padding-left:18px;padding-right:8px;background:linear-gradient(90deg, rgba(111,139,255,0.06), transparent 70%)}
  .work-row:hover::before{transform:scaleY(1)}
  .work-row .idx{font-family:var(--fs-mono);font-size:11px;color:var(--ink-faint);letter-spacing:0.06em}
  .work-row:hover .idx{color:var(--accent)}
  .work-row .title-col{display:flex;flex-direction:column;gap:6px;min-width:0}
  .work-row .title{font-family:var(--fs-mono);font-weight:500;font-size:clamp(22px, 2.6vw, 34px);line-height:1.1;letter-spacing:-0.03em;color:var(--ink);text-transform:lowercase;transition:color .25s}
  .work-row:hover .title{color:var(--accent)}
  .work-row .blurb{font-size:12.5px;color:var(--ink-dim);max-width:72ch;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .work-row .blurb::before{content:"// ";color:var(--ink-faint)}
  .work-row .cat{font-family:var(--fs-mono);font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap}
  .work-row .arrow{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-dim);transition:all .25s;font-family:var(--fs-mono);font-size:14px;
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));box-shadow:inset 0 1px 1px rgba(255,255,255,0.10), inset 0 -1px 2px rgba(0,0,0,0.5), 0 4px 10px -4px rgba(0,0,0,0.6)}
  .work-row:hover .arrow{background:linear-gradient(180deg, var(--accent-2), var(--accent));color:#0a1124;transform:translate(2px,-2px);box-shadow:0 0 0 1px rgba(255,255,255,0.18), 0 8px 18px -6px var(--accent-glow), inset 0 1px 1px rgba(255,255,255,0.5)}

  /* hover preview thumbnail (follows cursor) */
  .work-preview{position:fixed;width:240px;height:160px;overflow:hidden;pointer-events:none;z-index:40;border-radius:14px;background:#0a1022;opacity:0;transform:translate(-50%,-50%) scale(0.92);transition:opacity .2s, transform .35s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 0 1px var(--accent-soft), 0 30px 60px -16px rgba(0,0,0,0.85)}
  .work-preview.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .preview-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:
    repeating-linear-gradient(0deg, rgba(111,139,255,0.06) 0 1px, transparent 1px 24px),
    repeating-linear-gradient(90deg, rgba(111,139,255,0.06) 0 1px, transparent 1px 24px),
    linear-gradient(135deg, rgba(22,44,109,0.55), rgba(10,16,29,0.8))}
  #preview-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:1}
  .preview-mark{font-family:var(--fs-mono);font-weight:500;font-size:42px;color:var(--accent);line-height:1;text-shadow:0 0 18px var(--accent-glow);position:relative;z-index:2}
  .preview-meta{position:absolute;left:10px;right:10px;bottom:8px;display:flex;justify-content:space-between;align-items:end;color:#fff;font-family:var(--fs-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;z-index:3;text-shadow:0 1px 4px rgba(0,0,0,0.7)}
  .preview-meta .pm-cat{color:var(--ink-dim)}
  .preview-meta .pm-tag{color:var(--accent)}
  .preview-frame{position:absolute;top:6px;left:6px;right:6px;display:flex;justify-content:space-between;color:var(--ink-faint);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;z-index:3;text-shadow:0 1px 4px rgba(0,0,0,0.7)}

  /* CARDS variant — physical depth cards */
  .work-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  @media (max-width: 760px){.work-grid{grid-template-columns:1fr}}
  .work-card{position:relative;border-radius:20px;padding:calc(var(--u)*3.5);transition:transform .35s, box-shadow .35s;overflow:hidden;
    background:linear-gradient(145deg, var(--navy-hi) 0%, var(--navy-lo) 100%);box-shadow:var(--depth-card)}
  .work-card:hover{transform:translateY(-4px);box-shadow:0 50px 110px -26px rgba(0,0,0,0.9), 0 22px 44px -20px rgba(0,0,0,0.75), inset 0 1px 1px rgba(255,255,255,0.14), inset 0 -2px 4px rgba(0,0,0,0.55)}
  .work-card .thumb{aspect-ratio: 16/10;border-radius:12px;background:
    repeating-linear-gradient(0deg, rgba(157,180,255,0.08) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(157,180,255,0.08) 0 1px, transparent 1px 28px),
    linear-gradient(135deg, rgba(22,44,109,0.6), rgba(10,16,29,0.4));
    display:flex;align-items:center;justify-content:center;font-family:var(--fs-mono);font-weight:500;font-size:44px;color:var(--accent);margin-bottom:18px;text-shadow:0 0 14px var(--accent-glow);box-shadow:inset 0 1px 2px rgba(255,255,255,0.08), inset 0 -2px 6px rgba(0,0,0,0.6)}
  .work-card .ctitle{font-family:var(--fs-mono);font-weight:500;font-size:20px;line-height:1.15;letter-spacing:-0.02em;text-transform:lowercase;margin:8px 0 6px;color:#fff}
  .work-card .ccat{font-family:var(--fs-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .work-card .cblurb{font-size:12.5px;color:rgba(220,228,246,0.7);line-height:1.6}

  /* INDEX variant */
  .work-index{font-family:var(--fs-mono);font-size:12.5px}
  .work-index .head, .work-index .row{display:grid;grid-template-columns:48px 1.4fr 1fr 1fr 32px;gap:16px;padding:12px 4px;border-bottom:1px solid var(--line);align-items:center}
  .work-index .head{color:var(--ink-faint);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;border-bottom-color:var(--line-strong)}
  .work-index .row{cursor:pointer;transition:background .2s;color:var(--ink-dim);border-radius:8px}
  .work-index .row:hover{background:rgba(111,139,255,0.07);color:var(--ink)}
  .work-index .row .tname{color:var(--ink);text-transform:lowercase}
  .work-index .row:hover .tname{color:var(--accent)}

  /* ─────────────── APPROACH ─────────────── */
  .approach-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:start}
  @media (max-width: 900px){.approach-grid{grid-template-columns:1fr}}
  .approach h2{font-family:var(--fs-mono);font-weight:500;font-size:clamp(28px, 4vw, 52px);line-height:1.05;letter-spacing:-0.03em;margin:0 0 16px;text-transform:lowercase;
    background:linear-gradient(180deg, #ffffff 0%, #9aa6c4 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 10px 20px rgba(0,0,0,0.45))}
  .approach h2 .acc{color:var(--accent);-webkit-text-fill-color:var(--accent);filter:drop-shadow(0 0 16px var(--accent-glow))}
  .approach p{color:var(--ink-dim);font-size:13.5px;line-height:1.7;max-width:60ch;margin:0 0 18px}
  .approach p::before{content:"> ";color:var(--accent);opacity:.6}
  .principles{display:flex;flex-direction:column;gap:0}
  .principle{display:grid;grid-template-columns:48px 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--line);position:relative}
  .principle:last-child{border-bottom:1px solid var(--line)}
  .principle::before{content:"";position:absolute;left:0;top:0;height:1px;width:0;background:var(--accent);box-shadow:0 0 12px var(--accent-glow);transition:width .8s ease}
  .principle.in::before{width:48px}
  .principle .pn{font-family:var(--fs-mono);font-size:11px;color:var(--accent);letter-spacing:0.06em;padding-top:4px}
  .principle .pt{font-family:var(--fs-mono);font-weight:500;font-size:16px;line-height:1.3;color:var(--ink);margin-bottom:6px;text-transform:lowercase;letter-spacing:-0.01em}
  .principle .pd{font-size:13px;color:var(--ink-dim);line-height:1.6}

  /* ─────────────── STACK ─────────────── */
  .stack-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:14px}
  @media (max-width: 900px){.stack-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width: 540px){.stack-grid{grid-template-columns:1fr}}
  .stack-cell{border-radius:16px;padding:calc(var(--u)*3);min-height:200px;display:flex;flex-direction:column;gap:14px;transition:transform .25s, box-shadow .25s;position:relative;overflow:hidden;
    background:linear-gradient(160deg, rgba(22,44,109,0.45) 0%, rgba(10,16,29,0.85) 100%);box-shadow:var(--depth-glass)}
  .stack-cell::before{content:"";position:absolute;top:0;left:0;width:0;height:1px;background:var(--accent);box-shadow:0 0 12px var(--accent-glow);transition:width .6s ease}
  .stack-cell.in::before{width:100%}
  .stack-cell:hover{transform:translateY(-3px);box-shadow:0 0 0 1px rgba(255,255,255,0.08), 0 30px 60px -18px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.16)}
  .stack-cell .sh{font-family:var(--fs-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent)}
  .stack-cell .st{font-family:var(--fs-mono);font-weight:500;font-size:16px;line-height:1.2;color:var(--ink);text-transform:lowercase;letter-spacing:-0.01em}
  .stack-cell .stags{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
  .stack-cell .tag{font-family:var(--fs-mono);font-size:11px;color:var(--ink-dim);padding:3px 9px;border-radius:6px;transition:all .2s;
    background:rgba(255,255,255,0.03);box-shadow:inset 0 1px 1px rgba(255,255,255,0.06), inset 0 -1px 1px rgba(0,0,0,0.4)}
  .stack-cell .tag::before{content:"#";color:var(--ink-faint);margin-right:2px}
  .stack-cell .tag:hover{color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent-soft)}

  /* numeric counters — physical cells */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:calc(var(--u)*8)}
  @media (max-width: 760px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{border-radius:14px;padding:calc(var(--u)*2.5) calc(var(--u)*3);display:flex;flex-direction:column;gap:4px;
    background:linear-gradient(160deg, rgba(22,44,109,0.4) 0%, rgba(10,16,29,0.85) 100%);box-shadow:var(--depth-glass)}
  .stat .sn{font-family:var(--fs-mono);font-weight:300;font-size:clamp(28px, 3.6vw, 44px);line-height:1;color:var(--accent);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;text-shadow:0 0 18px var(--accent-glow)}
  .stat .sl{font-family:var(--fs-mono);font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-faint)}

  /* ─────────────── CONTACT ─────────────── */
  .contact{padding-bottom:calc(var(--u) * 16)}
  .contact-card{position:relative;border-radius:28px;padding:clamp(28px, 5vw, 64px);overflow:hidden;
    background:linear-gradient(145deg, var(--navy-hi) 0%, var(--navy-lo) 100%);box-shadow:var(--depth-card)}
  .contact-card::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(157,180,255,0.04) 0 1px, transparent 1px 32px),
      repeating-linear-gradient(90deg, rgba(157,180,255,0.04) 0 1px, transparent 1px 32px);
    mask-image:radial-gradient(ellipse at 30% 0%, #000, transparent 75%);-webkit-mask-image:radial-gradient(ellipse at 30% 0%, #000, transparent 75%)}
  .contact-card::after{content:"";position:absolute;top:0;right:0;width:240px;height:240px;background:radial-gradient(circle at top right, var(--accent-glow), transparent 70%);filter:blur(24px);pointer-events:none}
  .contact-card h2{font-family:var(--fs-mono);font-weight:500;font-size:clamp(32px, 5vw, 72px);line-height:1.0;letter-spacing:-0.04em;margin:0 0 20px;position:relative;text-transform:lowercase;
    background:linear-gradient(180deg, #ffffff 0%, #aab6d6 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 12px 24px rgba(0,0,0,0.6))}
  .contact-card h2 .acc{color:var(--accent);-webkit-text-fill-color:var(--accent);filter:drop-shadow(0 0 18px var(--accent-glow))}
  .contact-card p{color:rgba(220,228,246,0.72);font-size:14px;max-width:54ch;margin:0 0 28px;position:relative}
  .contact-card p::before{content:"> ";color:var(--accent);opacity:.6}
  .contact-actions{display:flex;flex-wrap:wrap;gap:12px;position:relative}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;font-family:var(--fs-mono);font-size:11.5px;letter-spacing:0.06em;text-transform:uppercase;border-radius:14px;transition:all .4s cubic-bezier(.25,1,.5,1)}
  /* physical light button */
  .btn-primary{background:linear-gradient(180deg, #ffffff 0%, #e6ebf6 100%);color:#0a1124;box-shadow:0 0 0 1px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.25), 0 12px 24px -6px rgba(0,0,0,0.55), inset 0 1px 1px rgba(255,255,255,1), inset 0 -3px 6px rgba(0,0,0,0.08)}
  .btn-primary:hover{transform:translateY(-3px);background:linear-gradient(180deg, #ffffff 0%, #f2f5fb 100%);box-shadow:0 0 0 1px rgba(0,0,0,0.06), 0 8px 16px -4px rgba(0,0,0,0.35), 0 22px 36px -8px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,1), inset 0 -3px 6px rgba(0,0,0,0.08)}
  .btn-primary:active{transform:translateY(1px);background:linear-gradient(180deg, #e6ebf6 0%, #d6ddec 100%);box-shadow:0 0 0 1px rgba(0,0,0,0.1), inset 0 3px 6px rgba(0,0,0,0.12)}
  /* physical dark button */
  .btn-ghost{color:var(--ink);background:linear-gradient(180deg, #2a3252 0%, #141a2e 100%);box-shadow:0 0 0 1px rgba(255,255,255,0.08), 0 2px 4px rgba(0,0,0,0.5), 0 12px 24px -6px rgba(0,0,0,0.75), inset 0 1px 1px rgba(255,255,255,0.14), inset 0 -3px 6px rgba(0,0,0,0.6)}
  .btn-ghost:hover{transform:translateY(-3px);color:var(--accent);background:linear-gradient(180deg, #354065 0%, #1b2238 100%);box-shadow:0 0 0 1px rgba(255,255,255,0.12), 0 8px 16px -4px rgba(0,0,0,0.6), 0 22px 34px -8px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.18), inset 0 -3px 6px rgba(0,0,0,0.6)}
  .btn-ghost:active{transform:translateY(1px);background:#141a2e;box-shadow:0 0 0 1px rgba(255,255,255,0.05), inset 0 3px 8px rgba(0,0,0,0.85)}
  .btn .ar{font-family:var(--fs-mono)}

  /* footer */
  .footer{padding:32px 0 48px;border-top:1px solid var(--line);font-family:var(--fs-mono);font-size:11px;color:var(--ink-faint);letter-spacing:0.04em}
  .footer-inner{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .footer .acc{color:var(--accent)}

  /* density */
  :root.density-compact{--u:6px}
  :root.density-regular{--u:8px}
  :root.density-spacious{--u:11px}

  /* type pairings */
  :root[data-type-pairing="jetbrains"]{--fs-mono:"JetBrains Mono", ui-monospace, monospace}
  :root[data-type-pairing="plex"]{--fs-mono:"IBM Plex Mono", ui-monospace, monospace}
  :root[data-type-pairing="geist"]{--fs-mono:"Geist Mono", ui-monospace, monospace}

  /* entrance reveals (scroll-driven) */
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .7s ease, transform .7s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:translateY(0)}
  .reveal-1{transition-delay:.05s}
  .reveal-2{transition-delay:.12s}
  .reveal-3{transition-delay:.19s}
  .reveal-4{transition-delay:.26s}

  /* line-by-line text scramble container */
  .scramble{display:inline}

  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1;transform:none;transition:none}
    #cosmic-canvas{opacity:.4}
  }
</style>
</head>
<body>

<!-- Cosmic background stage -->
<div id="cosmic-stage" aria-hidden="true">
  <canvas id="cosmic-canvas"></canvas>
  <div class="scanline"></div>
  <div class="vignette"></div>
</div>

<!-- Scroll progress bar -->
<div class="scroll-progress"><div class="bar" id="scroll-bar"></div></div>

<!-- Hover preview thumbnail (used by editorial list) -->
<div class="work-preview" id="work-preview">
  <div class="preview-frame"><span id="preview-frame-l">FRAME 01</span><span id="preview-frame-r">— —</span></div>
  <div class="preview-inner"><img id="preview-img" alt="" /><span class="preview-mark" id="preview-mark">⟁</span></div>
  <div class="preview-meta"><span class="pm-cat" id="preview-cat">CATEGORY</span><span class="pm-tag" id="preview-tag">VIEW →</span></div>
</div>

<div id="app"></div>

<!-- Libraries -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Cosmic stage: particle field (vanilla) -->
<script src="cosmic.js"></script>

<!-- Data + Tweaks panel + App -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
